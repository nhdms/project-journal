name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
          - goos: linux
            goarch: arm64
            runner: ubuntu-24.04-arm
          - goos: darwin
            goarch: amd64
            runner: macos-13
          - goos: darwin
            goarch: arm64
            runner: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install C toolchain (Linux)
        if: matrix.goos == 'linux'
        run: sudo apt-get install -y gcc

      - name: Build
        env:
          CGO_ENABLED: '1'
        run: |
          mkdir -p dist
          OUT="pj-${{ matrix.goos }}-${{ matrix.goarch }}"
          CGO_ENABLED=1 go build -trimpath \
            -ldflags="-s -w -X github.com/nhdms/project-journal/internal/cli.Version=${GITHUB_REF_NAME}" \
            -o "dist/${OUT}" ./cmd/pj
          (cd dist && tar -czf "${OUT}.tar.gz" "${OUT}" && sha256sum "${OUT}.tar.gz" > "${OUT}.tar.gz.sha256")

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pj-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
